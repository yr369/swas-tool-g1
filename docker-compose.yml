services:
  postgres:
    image: postgres:16-alpine
    container_name: swas_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - swas_internal

  redis:
    image: redis:7-alpine
    container_name: swas_redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - swas_internal

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: swas_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - backend_scan_data:/data/scans
      - nuclei_templates:/root/nuclei-templates
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - swas_internal

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: swas_frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - swas_internal

  caddy:
    image: caddy:2-alpine
    container_name: swas_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - frontend
    networks:
      - swas_internal

networks:
  swas_internal:
    driver: bridge

volumes:
  postgres_data:
  backend_scan_data:
  nuclei_templates:
  caddy_data:
  caddy_config:
